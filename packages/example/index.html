<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MText Renderer Example</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #e8e8e8;
        }
        #app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        #controls {
            flex: 0 0 50%;
            width: 50%;
            min-width: 360px;
            background: #333;
            color: white;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #222;
        }
        #render-area {
            flex: 1;
            min-width: 0;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #fff;
        }
        #wcs-coords {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
            pointer-events: none;
            z-index: 10;
            border-radius: 4px;
            white-space: nowrap;
            visibility: hidden;
        }
        canvas { 
            display: block;
            width: 100%;
            height: 100%;
        }
        #mtext-input {
            width: 100%;
            height: 140px;
            margin: 10px 0;
            padding: 8px;
            resize: vertical;
            min-height: 80px;
            max-height: 360px;
        }
        select {
            width: 100%;
            padding: 5px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .row .field {
            flex: 1;
            min-width: 0;
        }
        .row .field label {
            display: block;
        }
        input[type="color"] {
            width: 100%;
            height: 32px;
            padding: 0;
            margin: 5px 0;
            box-sizing: border-box;
            border: none;
        }
        button {
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
        }
        #status {
            margin-top: 10px;
            color: #ff0;
        }
        h2 {
            margin-top: 0;
            color: #fff;
        }
        .checkbox-container {
            margin: 10px 0;
            display: flex;
            align-items: center;
        }
        .checkbox-container input[type="checkbox"] {
            margin-right: 8px;
        }
        .examples {
            margin: 10px 0;
        }
        .examples h3 {
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: normal;
            color: #ccc;
        }
        .example-btn {
            background: #444;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
        }
        .example-btn:hover {
            background: #555;
        }
        .content-panel {
            margin: 10px 0;
        }
        .content-panel.hidden {
            display: none;
        }
        .content-panel input[type="number"],
        .content-panel input[type="text"] {
            width: 100%;
            padding: 5px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        .hint {
            font-size: 12px;
            color: #bbb;
            margin: 4px 0 8px;
        }
        .font-cache-panel {
            margin: 10px 0;
            padding: 10px;
            border: 1px dashed #666;
            border-radius: 4px;
            background: #2a2a2a;
        }
        .font-cache-panel label {
            display: block;
            margin-bottom: 6px;
        }
        .font-cache-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .font-cache-actions input[type="file"] {
            flex: 1;
            min-width: 220px;
            color: #ddd;
        }
        .font-cache-actions button {
            margin: 0;
        }
        .action-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .action-row .checkbox-container {
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="app-layout">
    <div id="controls">
        <h2>MText Renderer Example</h2>
        <div class="row">
            <div class="field">
                <label for="content-type">Content Type:</label>
                <select id="content-type">
                    <option value="mtext" selected>MText</option>
                    <option value="shape">SHAPE (SHX shape entity)</option>
                </select>
            </div>
            <div class="field">
                <label for="render-mode">Render Mode:</label>
                <select id="render-mode">
                    <option value="main">Main Thread</option>
                    <option value="worker">Web Worker</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label for="font-select">Text Style Font:</label>
                <select id="font-select">
                    <option value="simkai">simkai</option>
                </select>
            </div>
            <div class="field">
                <label for="default-fonts-preset">Default Fonts Preset:</label>
                <select id="default-fonts-preset">
                    <option value="minimal" selected>minimal (txt → amgdt → gdt → simkai)</option>
                    <option value="r12r14">r12r14 (txt → gdt)</option>
                    <option value="modern">modern (hztxt → gdt)</option>
                    <option value="international">international (txt → gdt)</option>
                    <option value="cjk">cjk (gbcbig → gdt)</option>
                </select>
            </div>
        </div>
        <div class="font-cache-panel">
            <label for="font-cache-input">Cache Local Font (.shx, .ttf, .otf, .woff):</label>
            <div class="font-cache-actions">
                <input type="file" id="font-cache-input" accept=".shx,.ttf,.otf,.woff,application/font-sfnt,font/woff" />
                <button type="button" id="font-cache-btn">Cache Font</button>
            </div>
            <p class="hint">Cached fonts appear in the font lists with a <code>[cached]</code> label and can be used for MText / SHAPE rendering.</p>
        </div>
        <div class="row">
            <div class="field">
                <label for="by-layer-color">ByLayer Color:</label>
                <input type="color" id="by-layer-color" value="#ffffff">
            </div>
            <div class="field">
                <label for="by-block-color">ByBlock Color:</label>
                <input type="color" id="by-block-color" value="#ffffff">
            </div>
        </div>
        <div id="mtext-panel" class="content-panel">
            <label for="mtext-input">MText:</label>
            <textarea id="mtext-input" placeholder="Enter MText content here... (Special characters: %%c=Ø, %%d=°, %%p=±)">{\C1;Hello World}\P{\C2;This is a test}\P{\C3;MText Renderer}</textarea>
        </div>
        <div id="shape-panel" class="content-panel hidden">
            <div class="row">
                <div class="field">
                    <label for="shape-font-select">Shape Font (SHX):</label>
                    <select id="shape-font-select">
                        <option value="complex" selected>complex</option>
                    </select>
                </div>
                <div class="field">
                    <label for="shape-name">Shape Name (optional):</label>
                    <input type="text" id="shape-name" placeholder="e.g. GRS when defined in font">
                </div>
            </div>
            <div class="row">
                <div class="field">
                    <label for="shape-number">Shape Number:</label>
                    <input type="number" id="shape-number" value="128" min="1" max="65535">
                </div>
                <div class="field">
                    <label for="shape-size">Height:</label>
                    <input type="number" id="shape-size" value="24" min="1" step="1">
                </div>
                <div class="field">
                    <label for="shape-width-factor">Width Factor:</label>
                    <input type="number" id="shape-width-factor" value="1" min="0.1" step="0.1">
                </div>
                <div class="field">
                    <label for="shape-rotation">Rotation (deg):</label>
                    <input type="number" id="shape-rotation" value="0" step="1">
                </div>
            </div>
            <p class="hint">Uses <code>complex.shx</code> by default. Shape number 128–132 render distinct glyphs; name lookup is tried first when provided.</p>
        </div>
        <div class="action-row">
            <button id="render-btn">Render</button>
            <div class="checkbox-container">
                <input type="checkbox" id="show-bounding-box" checked>
                <label for="show-bounding-box">Show Bounding Box</label>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="show-char-boxes">
                <label for="show-char-boxes">Show Char Boxes</label>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="show-line-boxes">
                <label for="show-line-boxes">Show Line Boxes</label>
            </div>
        </div>
        <div class="examples">
            <h3>Example Texts:</h3>
            <button class="example-btn" data-example="basic">Basic</button>
            <button class="example-btn" data-example="complex">Complex</button>
            <button class="example-btn" data-example="controlCode">Control Code</button>
            <button class="example-btn" data-example="color">Color</button>
            <button class="example-btn" data-example="font">Font</button>
            <button class="example-btn" data-example="defaultFonts">Default Fonts</button>
            <button class="example-btn" data-example="shapes">SHX Shapes</button>
            <button class="example-btn" data-example="alignment">Alignment</button>
            <button class="example-btn" data-example="paragraph">Paragraph</button>
            <button class="example-btn" data-example="stacking">Stacking</button>
            <button class="example-btn" data-example="multiple">Multiple MText</button>
            <button class="example-btn" data-example="attachmentGrid">Attachment Points</button>
            <button class="example-btn" data-example="largeCoordinatesRebase" title="Large WCS coords with rebase to origin; two MText blocks (\P\P); fonts via \Fname;">Large Coordinates (Rebase)</button>
            <button class="example-btn" data-example="largeCoordinatesNoRebase" title="Same WCS coords without rebase — compare float32 behavior; \P\P separates blocks; fonts via \Fname;">Large Coordinates (No Rebase)</button>
        </div>
        <div id="status"></div>
    </div>
    <div id="render-area">
        <div id="wcs-coords" aria-live="polite"></div>
    </div>
    </div>
    <!-- Load bundled example -->
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
